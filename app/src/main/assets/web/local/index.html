<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title data-i18n="app.dashboard_title">Dashboard - OverDrive</title>
    <link rel="icon" type="image/webp" href="../shared/app-icon-dark.webp">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="../shared/app-icon-dark.webp">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00876C">
    <script src="../shared/theme.js?v=4"></script>
    <script src="../shared/app-shell.js"></script>
    <link rel="stylesheet" href="../shared/leaflet.css">
    <script src="../shared/leaflet.js"></script>
    <link rel="stylesheet" href="../shared/styles.css?v=13">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
</head>
<body class="dashboard-page">
    <div class="app-layout">
        <div id="app-shell-mount"></div>

        <main class="main-content">
            <div class="mobile-header" id="mobileHeader">
                <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Open menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>
                    </svg>
                </button>
                <div class="brand"><span class="brand-name" style="font-size:16px;">OverDrive</span></div>
                <div style="width:40px;"></div>
            </div>

            <div class="dashboard-page-body">
                <section class="dash-hero">
                    <div class="dash-hero-main">
                        <div class="dash-hero-copy">
                            <h1 data-i18n="dashboard.heading">Dashboard</h1>
                            <p id="dashHeroSubtitle" data-i18n="dashboard.subtitle">Vehicle status, position and main controls.</p>
                        </div>
                        <div class="dash-hero-status">
                            <span class="dash-chip" id="dashConnChip" data-i18n="dashboard.chip_device_pending">Device --</span>
                            <span class="dash-chip" id="dashSurvChip" data-i18n="dashboard.chip_surveillance_pending">Surveillance --</span>
                            <span class="dash-chip" id="dashGpsChip" data-i18n="dashboard.chip_gps_pending">GPS --</span>
                        </div>
                    </div>
                    <div class="dash-vehicle-canvas-wrap">
                        <div class="dash-hero-soc" aria-live="polite">
                            <span data-i18n="dashboard.metric_battery">Battery</span>
                            <strong id="dashHeroSoc">--</strong>
                        </div>
                        <canvas id="dashHero3d" class="dash-vehicle-canvas" aria-hidden="true"></canvas>
                    </div>
                </section>

                <!--
                  Vehicle hero card. Renders the user's selected GLB tinted in
                  their selected paint colour, framed front-on so the front
                  fascia faces the camera. mountVehicleCanvas + the existing
                  applyVehicleSelection / overdrive:vehicle-changed pipeline
                  drive (model, colour) — same source of truth as the sidebar
                  EV-card. yawOffset = π/2 reuses the side rig and rotates the
                  GLB to face the camera (no new view in ev-card-3d.js).
                -->
                <!-- Reorderable card grid. Dashboard + vehicle now live in
                     the unified hero above; the remaining cards carry
                     data-card-id for layout persistence. -->
                <section class="dash-grid" id="dashCards">
                    <article class="dash-card dash-location-card" data-card-id="location">
                        <div class="dash-card-head">
                            <div>
                                <span class="dash-card-kicker" data-i18n="dashboard.kicker_position">Position</span>
                                <h2 data-i18n="dashboard.card_location">Vehicle location</h2>
                            </div>
                            <button class="dash-card-grip" type="button" aria-label="Drag to reorder" tabindex="-1">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
                            </button>
                        </div>
                        <div class="dash-location-map">
                            <div id="mapContainer"></div>
                        </div>
                        <div class="dash-action-row">
                            <button class="dash-primary-btn" type="button" onclick="BYD.dashboard.openDirections()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11 22 2l-9 19-2-8-8-2Z"/><path d="m11 13 4-4"/></svg>
                                <span data-i18n="dashboard.directions">Navigate to car</span>
                            </button>
                        </div>
                    </article>

                    <article class="dash-card dash-actions-card" data-card-id="commands">
                        <div class="dash-card-head">
                            <div>
                                <span class="dash-card-kicker" data-i18n="dashboard.kicker_commands">Commands</span>
                                <h2 data-i18n="dashboard.card_commands">Quick controls</h2>
                            </div>
                            <button class="dash-card-grip" type="button" aria-label="Drag to reorder" tabindex="-1">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
                            </button>
                        </div>
                        <div class="dash-command-grid">
                            <button class="dash-command" type="button" onclick="BYD.dashboard.command(this, '/api/vehicle/lock')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                                <span data-i18n="dashboard.cmd_lock">Lock</span>
                            </button>
                            <button class="dash-command" type="button" onclick="BYD.dashboard.command(this, '/api/vehicle/unlock')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 7.5-2"/></svg>
                                <span data-i18n="dashboard.cmd_unlock">Unlock</span>
                            </button>
                            <button class="dash-command" type="button" onclick="BYD.dashboard.command(this, '/api/vehicle/flash')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h8l-1 8 11-13h-8l1-7z"/></svg>
                                <span data-i18n="dashboard.cmd_flash">Flash</span>
                            </button>
                            <button class="dash-command" type="button" onclick="BYD.dashboard.command(this, '/api/vehicle/find-car')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/><path d="M11 8v3l2 2"/></svg>
                                <span data-i18n="dashboard.cmd_find">Find</span>
                            </button>
                            <button class="dash-command" type="button" onclick="BYD.dashboard.command(this, '/api/vehicle/trunk', {action:'open'})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"/><polyline points="12 11 12 6"/><polyline points="9 8 12 5 15 8"/></svg>
                                <span data-i18n="dashboard.cmd_trunk_open">Open trunk</span>
                            </button>
                            <button class="dash-command" type="button" onclick="BYD.dashboard.command(this, '/api/vehicle/trunk', {action:'close'})">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"/><polyline points="12 9 12 14"/><polyline points="9 12 12 15 15 12"/></svg>
                                <span data-i18n="dashboard.cmd_trunk_close">Close trunk</span>
                            </button>
                        </div>
                        <div class="dash-command-grid dash-command-grid-media">
                            <a class="dash-command" href="live-view.html">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><path d="M2 12a9 9 0 0 0 8 8"/><circle cx="2" cy="12" r="2"/></svg>
                                <span data-i18n="dashboard.cmd_live">Live</span>
                            </a>
                            <a class="dash-command" href="events.html">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2"/></svg>
                                <span data-i18n="dashboard.cmd_recordings">Recordings</span>
                            </a>
                            <a class="dash-command" href="trips.html">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 17h2v-7l4 4 4-4 4 4 4-4v7h2"/><path d="M4 5h16"/></svg>
                                <span data-i18n="dashboard.cmd_trips">Trips</span>
                            </a>
                        </div>
                    </article>

                    <article class="dash-card dash-info-card" data-card-id="info">
                        <div class="dash-card-head">
                            <div>
                                <span class="dash-card-kicker" data-i18n="dashboard.kicker_vehicle">Vehicle</span>
                                <h2 data-i18n="dashboard.card_info">Main info</h2>
                            </div>
                            <button class="dash-card-grip" type="button" aria-label="Drag to reorder" tabindex="-1">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="18" r="1"/></svg>
                            </button>
                        </div>
                        <div class="dash-metric-grid">
                            <div class="dash-metric"><span data-i18n="dashboard.metric_battery">Battery</span><strong id="dashSoc">--</strong></div>
                            <div class="dash-metric"><span data-i18n="dashboard.metric_range">Range</span><strong id="dashRange">--</strong></div>
                            <div class="dash-metric"><span>12V</span><strong id="dash12v">--</strong></div>
                            <div class="dash-metric"><span>ACC</span><strong id="dashAcc">--</strong></div>
                            <div class="dash-metric"><span data-i18n="dashboard.metric_network">Network</span><strong id="dashNetwork">--</strong></div>
                            <div class="dash-metric"><span data-i18n="dashboard.metric_lock">Lock</span><strong id="dashLock">--</strong></div>
                        </div>
                    </article>
                </section>
            </div>
        </main>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div id="toastContainer" class="toast-container"></div>

    <style>
        .dashboard-page .main-content {
            padding: 0;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg-base);
        }

        .dashboard-page-body {
            box-sizing: border-box;
            width: 100%;
            max-width: 1180px;
            /* Centering needs explicit auto cross-axis margins AND
               align-self because .main-content is display:flex column.
               Auto-margins alone leave the body left-aligned on some
               older WebViews. */
            margin-left: auto;
            margin-right: auto;
            align-self: center;
            padding: 22px;
            padding-bottom: calc(28px + var(--safe-bottom));
        }

        .dash-hero {
            display: grid;
            grid-template-columns: minmax(260px, 0.8fr) minmax(360px, 1.2fr);
            align-items: stretch;
            gap: 18px;
            padding: 20px;
            background:
                radial-gradient(80% 60% at 18% 12%,
                    rgba(0, 212, 170, 0.16) 0%,
                    rgba(0, 212, 170, 0.04) 40%,
                    transparent 70%),
                radial-gradient(60% 40% at 50% 100%,
                    rgba(0, 212, 170, 0.08) 0%,
                    transparent 65%),
                linear-gradient(135deg,
                    var(--bg-elevated) 0%,
                    var(--bg-surface) 60%,
                    var(--bg-base) 100%);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            overflow: hidden;
        }
        .dash-hero-copy {
            min-width: 0;
        }

        .dash-hero-main {
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 18px;
            padding: 4px 0 4px 4px;
        }

        .dash-hero h1,
        .dash-card h2 {
            margin: 0;
            color: var(--text-primary);
            letter-spacing: 0;
        }

        .dash-hero h1 {
            font-size: 32px;
            line-height: 1.1;
        }

        .dash-hero p {
            margin-top: 8px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .dash-hero-status,
        .dash-action-row {
            display: flex;
            gap: 8px;
        }

        .dash-hero-status {
            flex-wrap: nowrap;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
        }

        .dash-hero-status::-webkit-scrollbar { display: none; }

        .dash-action-row { flex-wrap: wrap; }

        .dash-chip {
            padding: 8px 11px;
            border-radius: 999px;
            background: var(--bg-elevated);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            /* Cap chip width so a verbose locale (long device-id, long
               GPS-cached label, etc.) can't push the chip row past the
               hero card boundary. Ellipsis kicks in only past the cap;
               normal-length chips render unchanged. */
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dash-chip.good { color: var(--brand-primary); border-color: rgba(0, 212, 170, 0.35); }
        .dash-chip.warn { color: #f59e0b; border-color: rgba(245, 158, 11, 0.35); }

        .dash-vehicle-canvas-wrap {
            position: relative;
            width: 100%;
            --dash-canvas-pad: 10px;
            /* Stable height for old BYD WebViews without aspect-ratio.
               Desktop fills the unified hero card; mobile trims to 200px. */
            min-height: 270px;
            height: 100%;
            /* Soft brand-tinted gradient. Diagonal teal glow upper-left
               fading to base elevated dark bottom-right gives the panel
               depth without competing with the 3D model. Layered:
                 1. broad teal radial highlight from upper-left,
                 2. faint warm glow under the car (ground bounce),
                 3. base elevated surface. */
            background: transparent;
            padding: var(--dash-canvas-pad);
            box-sizing: border-box;
        }

        .dash-vehicle-canvas {
            position: absolute;
            top: var(--dash-canvas-pad);
            left: var(--dash-canvas-pad);
            width: calc(100% - (var(--dash-canvas-pad) * 2));
            height: calc(100% - (var(--dash-canvas-pad) * 2));
            display: block;
        }

        .dash-hero-soc {
            position: absolute;
            top: 14px;
            right: 14px;
            z-index: 2;
            min-width: 90px;
            padding: 8px 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 170, 0.28);
            background: rgba(4, 18, 22, 0.68);
            backdrop-filter: blur(4px);
            text-align: right;
        }

        .dash-hero-soc span {
            display: block;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .dash-hero-soc strong {
            display: block;
            color: var(--text-primary);
            font-size: 20px;
            line-height: 1;
        }

        .dash-grid {
            display: grid;
            grid-template-columns: minmax(280px, 1fr) minmax(320px, 1.2fr);
            gap: 16px;
            margin-top: 16px;
        }

        .dash-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            padding: 18px;
        }

        .dash-info-card { grid-column: 1 / -1; }
        /* ── Drag-reorder handle ─────────────────────────────────────
           Six-dot grip sitting in the card head (or top-right corner
           for cards without a head). Wide hit target for thumb drag;
           visual is a small icon so it doesn't dominate. cursor:grab
           when idle, grabbing when dragging. Only shown when JS has
           attached the reorder controller (.dash-cards-ready on the
           parent). */
        .dash-card-grip {
            display: none;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            padding: 0;
            border: 0;
            background: transparent;
            color: var(--text-muted);
            cursor: grab;
            border-radius: 8px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            transition: background 0.15s ease, color 0.15s ease;
            flex: 0 0 auto;
        }
        .dash-cards-ready .dash-card-grip { display: inline-flex; }
        .dash-card-grip:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }
        .dash-card-grip:active { cursor: grabbing; }
        .dash-card-grip svg { width: 18px; height: 18px; }
        /* While a card is being dragged: lift it visually with a
           shadow + slight scale, and dim the rest. The .dash-card-ghost
           class marks the placeholder slot so siblings know where the
           dragged card will land — uses dashed outline + tinted bg. */
        .dash-card.dash-card-dragging {
            cursor: grabbing;
            opacity: 0.96;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45),
                        0 0 0 1px var(--brand-primary);
            transform: scale(1.01);
            z-index: 10;
            transition: box-shadow 0.18s ease, transform 0.18s ease;
        }
        .dash-card-ghost {
            outline: 2px dashed rgba(0, 212, 170, 0.5);
            outline-offset: -4px;
            background: rgba(0, 212, 170, 0.06);
            /* Hide ghost children — only the placeholder shape matters. */
        }
        .dash-card-ghost > * { visibility: hidden; }
        /* Smooth slide animation when other cards reflow around the
           dragged one. Skipped during active drag to avoid laggy feel. */
        .dash-cards-ready:not(.dash-cards-dragging) > * {
            transition: transform 0.22s cubic-bezier(0.2, 0, 0, 1);
        }

        .dash-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .dash-card-kicker {
            display: block;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .dash-card h2 {
            font-size: 18px;
            line-height: 1.2;
        }

        .dash-icon-btn,
        .dash-primary-btn,
        .dash-secondary-btn,
        .dash-command {
            border: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-radius: 8px;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }

        .dash-icon-btn {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .dash-icon-btn svg { width: 20px; height: 20px; }

        .dash-primary-btn {
            min-height: 44px;
            width: 100%;
            padding: 0 15px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            font-weight: 800;
            font-size: 13px;
            background: var(--brand-primary);
            border-color: var(--brand-primary);
            color: #001f1a;
        }

        .dash-primary-btn svg {
            width: 18px;
            height: 18px;
            flex: 0 0 auto;
        }

        .dash-secondary-btn {
            min-height: 38px;
            padding: 0 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
        }

        .dash-icon-btn:hover,
        .dash-primary-btn:hover,
        .dash-secondary-btn:hover,
        .dash-command:hover {
            background: rgba(0, 212, 170, 0.10);
            border-color: rgba(0, 212, 170, 0.35);
            color: var(--brand-primary);
        }

        .dash-primary-btn:hover {
            background: #00f0c0;
            border-color: #00f0c0;
            color: #001f1a;
        }

        .dash-command.pending {
            opacity: 0.55;
            pointer-events: none;
        }

        .dash-location-map {
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-elevated);
            overflow: hidden;
            margin-bottom: 14px;
        }

        .dash-location-map #mapContainer {
            width: 100%;
            height: 180px;
        }

        .dash-command-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        /* Recordings/Trips/Live live in their own grid below the vehicle controls.
           Always 3 columns regardless of viewport — only 3 items, never wraps. */
        .dash-command-grid-media {
            margin-top: 10px;
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .dash-command {
            min-height: 78px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 13px;
        }

        .dash-command svg {
            width: 23px;
            height: 23px;
            flex: 0 0 auto;
        }

        .dash-metric-grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 10px;
        }

        .dash-metric {
            min-height: 76px;
            padding: 13px;
            border-radius: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
        }

        .dash-metric span,
        .dash-metric strong {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .dash-metric span {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .dash-metric strong {
            color: var(--text-primary);
            font-size: 20px;
            line-height: 1.1;
        }

        @media (max-width: 980px) {
            .dash-grid,
            .dash-metric-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .dash-info-card { grid-column: auto; }
        }

        @media (max-width: 768px) {
            .dashboard-page-body {
                padding: 14px;
                padding-bottom: calc(96px + var(--safe-bottom));
            }
            .dash-hero {
                grid-template-columns: 1fr;
                padding: 18px;
            }
            .dash-hero h1 { font-size: 27px; }
            /* The GLB renders side-on (wider than tall); a fixed
               200px wastes vertical space on portrait phones. Scale
               with viewport width so the card stays proportional
               from a 320px small phone up to a 768px tablet, with
               hard floor + ceiling for legibility. PWA-only page
               (the head-unit's in-app WebView never loads this), so
               clamp() (Chrome 79+) is fair game. */
            .dash-vehicle-canvas-wrap {
                min-height: 140px;
                height: clamp(140px, 38vw, 200px);
            }
            .dash-grid,
            .dash-command-grid,
            .dash-metric-grid {
                grid-template-columns: 1fr 1fr;
            }
            /* Media tiles (Live / Recordings / Trips) stay 3 across so the
               row never widows a single tile on a second line. */
            .dash-command-grid-media {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 8px;
            }
            .dash-command-grid-media .dash-command {
                min-height: 64px;
                font-size: 12px;
            }
            .dash-location-card,
            .dash-actions-card,
            .dash-info-card {
                grid-column: 1 / -1;
            }
        }
    </style>

    <script src="../shared/auth.js"></script>
    <script src="../shared/pwa-init.js?v=index1"></script>
    <script src="../shared/core.js"></script>
    <script src="../shared/update-flow.js"></script>
    <script src="../shared/map.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        BYD.dashboard = {
            lastStatus: null,
            command: function(btn, url, payload) {
                if (!btn || btn.classList.contains('pending')) return;
                btn.classList.add('pending');
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: payload ? JSON.stringify(payload) : undefined
                }).then(function(r) {
                    return r.json();
                }).then(function(data) {
                    var ok = !!(data && data.success);
                    var fallback = ok
                        ? (BYD.i18n.t('dashboard.toast_command_sent') || 'Command sent')
                        : (BYD.i18n.t('dashboard.toast_command_failed') || 'Command failed');
                    var msg = (data && (data.message || data.error)) || fallback;
                    if (BYD.utils && BYD.utils.toast) BYD.utils.toast(msg, ok ? 'success' : 'error');
                    setTimeout(function() { BYD.dashboard.refreshVehicleState(); }, 700);
                }).catch(function() {
                    if (BYD.utils && BYD.utils.toast) BYD.utils.toast(BYD.i18n.t('dashboard.toast_command_failed') || 'Command failed', 'error');
                }).finally(function() {
                    btn.classList.remove('pending');
                });
            },
            refreshVehicleState: function() {
                fetch('/api/vehicle/state').then(function(r) {
                    return r.json();
                }).then(function(data) {
                    if (!data || !data.success) return;
                    BYD.dashboard.updateVehicleState(data);
                }).catch(function() {});
            },
            updateVehicleState: function(data) {
                var lockEl = document.getElementById('dashLock');
                if (!lockEl || !data || !data.doors) return;
                var overall = data.doors.overall;
                if (overall === 1) lockEl.textContent = BYD.i18n.t('dashboard.status_locked') || 'Locked';
                else if (overall === 2) lockEl.textContent = BYD.i18n.t('dashboard.status_unlocked') || 'Unlocked';
                else lockEl.textContent = '--';
            },
            updateFromStatus: function(status) {
                if (!status) return;
                this.lastStatus = status;

                function setText(id, value) {
                    var el = document.getElementById(id);
                    if (el) el.textContent = value;
                }
                function setChip(id, value, cls) {
                    var el = document.getElementById(id);
                    if (!el) return;
                    el.textContent = value;
                    el.classList.remove('good', 'warn');
                    if (cls) el.classList.add(cls);
                }
                function timeAgo(timestamp) {
                    // Returns "Ns ago" / "Nm ago" / "Nh ago" using locale-
                    // aware suffixes from the catalog. Catalog values
                    // contain `{n}` placeholder; while the catalog is
                    // still loading (i18n.t returns null) we fall back to
                    // English unit letters.
                    var seconds = Math.floor((Date.now() - timestamp) / 1000);
                    if (seconds < 60) {
                        var s = BYD.i18n.t('dashboard.time_seconds_ago', { n: seconds });
                        return s || (seconds + 's ago');
                    }
                    var minutes = Math.floor(seconds / 60);
                    if (minutes < 60) {
                        var m = BYD.i18n.t('dashboard.time_minutes_ago', { n: minutes });
                        return m || (minutes + 'm ago');
                    }
                    var hours = Math.floor(minutes / 60);
                    var h = BYD.i18n.t('dashboard.time_hours_ago', { n: hours });
                    return h || (hours + 'h ago');
                }
                function tOnOff(on) {
                    return on
                        ? (BYD.i18n.t('status.on') || 'ON')
                        : (BYD.i18n.t('status.off') || 'OFF');
                }

                var deviceLabel = BYD.i18n.t('dashboard.chip_device_value', { id: status.deviceId || '--' })
                                  || ('Device ' + (status.deviceId || '--'));
                setChip('dashConnChip', deviceLabel, status.deviceId ? 'good' : '');
                var survLabel = BYD.i18n.t('dashboard.chip_surveillance_value', { state: tOnOff(status.gpuSurveillance) })
                                || ('Surveillance ' + tOnOff(status.gpuSurveillance));
                setChip('dashSurvChip', survLabel, status.gpuSurveillance ? 'good' : '');
                setText('dashAcc', tOnOff(status.acc));

                if (status.battery && status.battery.voltage) setText('dash12v', status.battery.voltage.toFixed(1) + 'V');
                if (status.soc && status.soc.percent !== undefined) {
                    var socText = Math.round(status.soc.percent) + '%';
                    setText('dashSoc', socText);
                    setText('dashHeroSoc', socText);
                } else {
                    setText('dashSoc', '--');
                    setText('dashHeroSoc', '--');
                }
                if (status.range && status.range.elecRangeKm !== undefined) setText('dashRange', BYD.units.dist(status.range.elecRangeKm));

                if (status.network && status.network.type === 'wifi') setText('dashNetwork', status.network.ssid || 'WiFi');
                else if (status.network && status.network.type === 'mobile') setText('dashNetwork', BYD.i18n.t('dashboard.network_mobile') || 'Mobile');
                else setText('dashNetwork', '--');

                if (status.gps && status.gps.hasLocation) {
                    var stale = status.gps.isCached || status.gps.isStale;
                    var gpsChip = stale
                        ? (BYD.i18n.t('dashboard.chip_gps_cached') || 'GPS cached')
                        : (BYD.i18n.t('dashboard.chip_gps_live') || 'GPS live');
                    setChip('dashGpsChip', gpsChip, stale ? 'warn' : 'good');
                } else {
                    setChip('dashGpsChip', BYD.i18n.t('dashboard.chip_gps_pending') || 'GPS --', '');
                }
            },
            openDirections: function() {
                var gps = this.lastStatus && this.lastStatus.gps;
                if (!gps || !gps.hasLocation) {
                    if (BYD.utils && BYD.utils.toast) BYD.utils.toast(BYD.i18n.t('dashboard.toast_no_location') || 'Car location not available', 'error');
                    return;
                }
                window.open('https://www.google.com/maps/dir/?api=1&destination=' + gps.lat + ',' + gps.lng + '&travelmode=driving', '_blank');
            }
        };

        var originalCoreRefreshStatus = BYD.core.refreshStatus.bind(BYD.core);
        BYD.core.refreshStatus = function() {
            return originalCoreRefreshStatus().then(function(status) {
                if (status && BYD.dashboard && BYD.dashboard.updateFromStatus) {
                    BYD.dashboard.updateFromStatus(status);
                }
                return status;
            });
        };

        BYD.i18n.init().then(function() {
            BYD.core.init();
            if (BYD.map) BYD.map.init();
            BYD.dashboard.refreshVehicleState();
            setInterval(function() { BYD.dashboard.refreshVehicleState(); }, 6000);
        });

        // Hero 3D vehicle. Mounts via OverdriveAppShell.mountVehicleCanvas
        // (same pipeline as the sidebar EV-card), passing only `view`
        // — the dashboard hero gets the identical side-profile framing
        // the sidebar uses. (model, colour) come from the daemon's
        // /api/models/selected endpoint via the shell's standard
        // applyVehicleSelection() flow.
        //
        // mountVehicleCanvas internally calls ensureEv3d() which looks
        // for the sidebar's #evCardCanvas to decide whether to inject
        // ev-card-3d.js — so we must wait for the sidebar to be mounted
        // before calling. The shell dispatches `app-shell:ready` after
        // mount; we listen for that (with a DOMContentLoaded fallback).
        //
        // Note: on the laptop static-server preview the daemon endpoint
        // 404s, so neither sidebar EV-card nor this hero canvas paint
        // a model. To preview the dashboard layout/CSS in a browser
        // without the device, run the app on-device. We do not seed
        // any synthetic default here — keeping the renderer pipeline
        // strictly daemon-driven matches the sidebar's behaviour.
        (function () {
            var didMount = false;
            function mountHero() {
                if (didMount) return;
                var canvas = document.getElementById('dashHero3d');
                if (!canvas) return;
                var shell = window.OverdriveAppShell;
                if (!shell || typeof shell.mountVehicleCanvas !== 'function') return;
                didMount = true;
                shell.mountVehicleCanvas(canvas, { view: 'three-quarter' });
            }
            document.addEventListener('app-shell:ready', mountHero);
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function () {
                    setTimeout(mountHero, 0);
                });
            } else {
                setTimeout(mountHero, 0);
            }
        })();

        // ── Dashboard card reorder ──────────────────────────────────
        // PWA-only feature (the head-unit's in-app WebView never loads
        // this page). Long-press / pointer-down on a card's grip
        // handle starts a drag; sibling cards reflow with a slide
        // animation; on drop, the new sibling order is persisted to
        // localStorage and restored on next load.
        //
        // Why this design:
        //   - Native HTML5 drag-and-drop has too many WebKit/iOS
        //     quirks (drag images that won't follow the pointer,
        //     event ordering differences) so we use Pointer Events
        //     directly and move the dragged card with absolute
        //     position + transform.
        //   - Drag is initiated only from the .dash-card-grip handle,
        //     not from anywhere on the card. That keeps inner buttons,
        //     selects, and the map fully interactive.
        //   - We don't change CSS grid lines per-card; we only
        //     reorder the DOM. The grid-column property stays on the
        //     class (e.g. .dash-card-full spans all columns), so a
        //     full-width card looks full-width regardless of order.
        (function () {
            var STORAGE_KEY = 'overdrive.dashboard.cardOrder';
            var grid = document.getElementById('dashCards');
            if (!grid) return;

            // Restore saved order before the controller goes interactive
            // so first paint matches the user's last layout.
            try {
                var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
                if (saved && Array.isArray(saved)) {
                    var byId = {};
                    Array.prototype.forEach.call(grid.children, function (el) {
                        var id = el.getAttribute('data-card-id');
                        if (id) byId[id] = el;
                    });
                    saved.forEach(function (id) {
                        if (byId[id]) grid.appendChild(byId[id]);
                    });
                    // Anything not in the saved list (newly added cards
                    // in a future build) sticks to the natural-order
                    // position — they'll already be after the moved
                    // siblings since appendChild moves to end.
                }
            } catch (e) { /* corrupted entry — ignore, keep default order */ }

            grid.classList.add('dash-cards-ready');

            var dragging = null;       // the card element being dragged
            var pointerId = null;
            var startX = 0, startY = 0;
            var grabOffsetX = 0, grabOffsetY = 0;
            var ghost = null;          // placeholder element shown in flow
            var savedStyle = null;     // restore on drop

            function siblingCards() {
                return Array.prototype.filter.call(grid.children, function (c) {
                    return c !== ghost && c !== dragging
                        && c.getAttribute('data-card-id') !== null;
                });
            }

            // Find the sibling whose center the pointer is closest to,
            // and whether to insert before or after it. We use centroid
            // distance (not bounding-box hit-test) so the user can drag
            // over the gap between two cards and the closer one wins.
            function pickInsertion(pointerX, pointerY) {
                var cards = siblingCards();
                var bestEl = null;
                var bestBefore = false;
                var bestDist = Infinity;
                for (var i = 0; i < cards.length; i++) {
                    var r = cards[i].getBoundingClientRect();
                    var cx = r.left + r.width / 2;
                    var cy = r.top + r.height / 2;
                    var dx = pointerX - cx, dy = pointerY - cy;
                    var d = dx * dx + dy * dy;
                    if (d < bestDist) {
                        bestDist = d;
                        bestEl = cards[i];
                        // Insert BEFORE this card if pointer is above-left
                        // of its center, AFTER otherwise. For a CSS grid
                        // that wraps to multiple rows, "before" means
                        // pointer.y < center.y (or same row & pointer.x <
                        // center.x).
                        bestBefore = pointerY < cy
                            || (Math.abs(pointerY - cy) < r.height / 2
                                && pointerX < cx);
                    }
                }
                return { el: bestEl, before: bestBefore };
            }

            function updateGhostPosition(pointerX, pointerY) {
                var pick = pickInsertion(pointerX, pointerY);
                if (!pick.el || !ghost) return;
                if (pick.before) {
                    grid.insertBefore(ghost, pick.el);
                } else {
                    var nxt = pick.el.nextSibling;
                    while (nxt && nxt.nodeType !== 1) nxt = nxt.nextSibling;
                    grid.insertBefore(ghost, nxt);
                }
            }

            function startDrag(card, ev) {
                if (dragging) return;
                dragging = card;
                pointerId = ev.pointerId;
                var r = card.getBoundingClientRect();
                grabOffsetX = ev.clientX - r.left;
                grabOffsetY = ev.clientY - r.top;
                startX = ev.clientX;
                startY = ev.clientY;

                // Build the placeholder ghost: same dimensions as the
                // card so the grid layout doesn't shift when we lift
                // the original out of flow.
                ghost = document.createElement(card.tagName);
                ghost.className = card.className + ' dash-card-ghost';
                ghost.style.height = r.height + 'px';
                ghost.setAttribute('data-card-ghost', '1');
                grid.insertBefore(ghost, card);

                // Lift the dragged card out of the grid flow.
                savedStyle = {
                    position: card.style.position,
                    top: card.style.top,
                    left: card.style.left,
                    width: card.style.width,
                    height: card.style.height,
                    margin: card.style.margin,
                    pointerEvents: card.style.pointerEvents,
                };
                card.style.position = 'fixed';
                card.style.top = r.top + 'px';
                card.style.left = r.left + 'px';
                card.style.width = r.width + 'px';
                card.style.height = r.height + 'px';
                card.style.margin = '0';
                card.style.pointerEvents = 'none';
                card.classList.add('dash-card-dragging');
                grid.classList.add('dash-cards-dragging');
                document.body.style.userSelect = 'none';
                document.body.style.webkitUserSelect = 'none';
            }

            function moveDrag(ev) {
                if (!dragging || ev.pointerId !== pointerId) return;
                if (ev.cancelable) ev.preventDefault();
                dragging.style.left = (ev.clientX - grabOffsetX) + 'px';
                dragging.style.top = (ev.clientY - grabOffsetY) + 'px';
                updateGhostPosition(ev.clientX, ev.clientY);
            }

            function endDrag(ev) {
                if (!dragging || ev.pointerId !== pointerId) return;
                // Place the dragged card where the ghost is.
                if (ghost && ghost.parentNode === grid) {
                    grid.insertBefore(dragging, ghost);
                    grid.removeChild(ghost);
                }
                ghost = null;
                // Restore inline styles.
                if (savedStyle) {
                    dragging.style.position = savedStyle.position;
                    dragging.style.top = savedStyle.top;
                    dragging.style.left = savedStyle.left;
                    dragging.style.width = savedStyle.width;
                    dragging.style.height = savedStyle.height;
                    dragging.style.margin = savedStyle.margin;
                    dragging.style.pointerEvents = savedStyle.pointerEvents;
                }
                dragging.classList.remove('dash-card-dragging');
                grid.classList.remove('dash-cards-dragging');
                document.body.style.userSelect = '';
                document.body.style.webkitUserSelect = '';
                dragging = null;
                pointerId = null;
                savedStyle = null;
                // Persist new order.
                var order = Array.prototype.map.call(grid.children, function (c) {
                    return c.getAttribute('data-card-id');
                }).filter(function (id) { return id; });
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(order)); }
                catch (e) { /* localStorage may be disabled — silently ignore */ }
            }

            // Delegate pointer events on the grid so we don't bind
            // per-card. Drag origin must be a .dash-card-grip; clicks
            // / drags anywhere else inside a card pass through to the
            // inner controls (buttons, links, the map).
            grid.addEventListener('pointerdown', function (ev) {
                if (ev.button !== undefined && ev.button !== 0) return;
                var grip = ev.target.closest && ev.target.closest('.dash-card-grip');
                if (!grip) return;
                var card = grip.closest('[data-card-id]');
                if (!card) return;
                ev.preventDefault();
                try { grip.setPointerCapture(ev.pointerId); } catch (e) {}
                startDrag(card, ev);
            });
            // pointermove / up are bound to the document so the drag
            // survives the pointer leaving the grid bounds.
            document.addEventListener('pointermove', moveDrag);
            document.addEventListener('pointerup', endDrag);
            document.addEventListener('pointercancel', endDrag);
        })();
    </script>
