        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* ====================================================================
           Video transport — sits OUTSIDE the zooming .video-player surface so
           none of these controls move when a quadrant transform fires. This
           replaces the native <video controls> overlay (which can't be used
           here because it scales with the video element).
           ==================================================================== */
        .video-transport {
            background: var(--bg-elevated);
            display: flex;
            flex-direction: column;
            gap: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        /* SOTA: Event Timeline Scrubber.
           22 px tall touch target on the head unit; the visible track is the
           inner 6 px stripe. This matches Material 3's "thin track, generous
           tap area" pattern and YouTube's mobile player. */
        .timeline-scrubber {
            position: relative;
            width: 100%;
            height: 22px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* Inner visible stripe — centered vertically. Click/drag still
           registers on the full 22 px parent, so users don't have to thread
           a needle to seek. */
        .timeline-track {
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            height: 6px;
            background: rgba(148, 163, 184, 0.18);
            border-radius: 3px;
            overflow: visible;
        }

        /* Watched-progress fill (always behind the markers so a contiguous
           motion stripe still reads as motion, not "watched"). */
        .timeline-progress {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 0;
            background: var(--brand-primary);
            border-radius: 3px;
            pointer-events: none;
            transition: width 0.08s linear;
        }

        .timeline-marker {
            position: absolute;
            /* Markers extend slightly above/below the track stripe so
               event bands read as proper "highlights" on top of the
               progress fill rather than a hairline within it. */
            top: -3px;
            bottom: -3px;
            min-width: 2px;
            border-radius: 2px;
            pointer-events: none;
        }

        .timeline-marker.type-motion {
            background: rgba(148, 163, 184, 0.6);
        }

        .timeline-marker.type-person {
            background: rgba(239, 68, 68, 0.85);
        }

        .timeline-marker.type-car {
            background: rgba(59, 130, 246, 0.85);
        }

        .timeline-marker.type-bike {
            background: rgba(251, 146, 60, 0.85);
        }

        .timeline-playhead {
            position: absolute;
            top: 50%;
            left: 0;
            width: 14px;
            height: 14px;
            margin-left: -7px;
            margin-top: -7px;
            border-radius: 50%;
            background: white;
            pointer-events: none;
            z-index: 3;
            box-shadow: 0 1px 6px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,0,0,0.18);
            /* No transition during scrub — feels laggy. Re-enabled while
               playing via .smooth so timeupdate's 4 Hz cadence interpolates
               into a smooth crawl instead of stepping. */
        }
        .timeline-playhead.smooth { transition: left 0.25s linear; }
        .timeline-scrubber.dragging .timeline-playhead { transform: scale(1.18); }

        .timeline-legend {
            display: flex;
            gap: 12px;
            padding: 6px 12px;
            justify-content: center;
            border-top: 1px solid var(--border-subtle);
        }

        /* Transport row — play/pause + time + mute. Lives below the scrubber
           and is never affected by the quadrant zoom. */
        .video-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-top: 1px solid var(--border-subtle);
        }

        .video-ctrl-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            transition: background 150ms ease;
        }
        .video-ctrl-btn:hover { background: var(--bg-hover); }
        .video-ctrl-btn:active { background: var(--bg-elevated); }
        .video-ctrl-btn svg { width: 22px; height: 22px; }

        .video-time {
            font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            padding: 0 4px;
            font-variant-numeric: tabular-nums;
        }
        .video-time .sep { color: var(--text-muted); margin: 0 2px; }
        .video-time .dur { color: var(--text-muted); }

        /* Spacer pushes the mute button to the right edge of the row. */
        .video-controls .spacer { flex: 1; }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: var(--text-muted);
        }
        
        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }
        
        .legend-motion { background: rgba(148, 163, 184, 0.6); }
        .legend-person { background: rgba(239, 68, 68, 0.85); }
        .legend-car { background: rgba(59, 130, 246, 0.85); }
        .legend-bike { background: rgba(251, 146, 60, 0.85); }
        
        /* Multi-Select Mode */
        .select-mode-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: var(--bg-elevated);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }
        
        .select-mode-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .select-mode-btn.active {
            background: var(--brand-primary);
            color: var(--bg-base);
        }
        
        .select-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border-subtle);
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .selected-count {
            font-size: 13px;
            font-weight: 600;
            color: var(--brand-primary);
            white-space: nowrap;
        }
        
        .select-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .select-action-btn {
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-weight: 500;
            background: var(--bg-surface);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .select-action-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        
        .select-action-btn.danger {
            color: var(--danger);
            border-color: var(--danger);
        }
        
        .select-action-btn.danger:hover {
            background: var(--danger);
            color: white;
        }
        
        .select-action-btn.cancel {
            color: var(--text-muted);
        }
        
        /* Checkbox in recording cards */
        .select-checkbox-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            padding: 4px;
        }
        
        .select-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--brand-primary);
            cursor: pointer;
        }
        
        .recording-card.selected {
            border-color: var(--brand-primary);
            background: rgba(14, 165, 233, 0.08);
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <!-- App shell sidebar (rendered by ../shared/app-shell.js) -->
        <div id="app-shell-mount"></div>
        <!-- Main Content -->
        <main class="main-content">
            <div class="mobile-header">
                <button class="menu-toggle" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/>
                    </svg>
                </button>
                <span style="font-weight:600;" data-i18n="nav.events">Events</span>
                <div style="width:40px;"></div>
            </div>
            <div class="events-container">
                <!-- Top Bar: Calendar Toggle + Filters + Storage -->
                <div class="events-top-bar">
                    <button class="calendar-toggle" id="calendarToggle" onclick="BYD.events.toggleCalendar()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span id="calendarBtnText" data-i18n="events.select_date">Select Date</span>
                    </button>

                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="all" onclick="BYD.events.setFilter('all')" data-i18n="events.all">All</button>
                        <button class="filter-tab" data-filter="sentry" onclick="BYD.events.setFilter('sentry')" data-i18n="events.badge_sentry">Sentry</button>
                        <button class="filter-tab" data-filter="normal" onclick="BYD.events.setFilter('normal')" data-i18n="events.badge_normal">Normal</button>
                        <button class="filter-tab" data-filter="proximity" onclick="BYD.events.setFilter('proximity')" data-i18n="events.badge_proximity">Proximity</button>
                    </div>

                    <div class="storage-stats" id="storageStats">
                        <div class="storage-info">
                            <span class="storage-value" id="storageUsed">--</span>
                            <div class="storage-bar-mini">
                                <div class="storage-fill" id="storageFill" style="width: 0%"></div>
                            </div>
                        </div>
                        <div class="storage-breakdown">
                            <div class="storage-item">
                                <span class="storage-dot normal"></span>
                                <span id="normalCount">0</span>
                            </div>
                            <div class="storage-item">
                                <span class="storage-dot sentry"></span>
                                <span id="sentryCount">0</span>
                            </div>
                            <div class="storage-item">
                                <span class="storage-dot proximity"></span>
                                <span id="proximityCount">0</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!--
                  v3 actor / severity / proximity chip rows. Lives OUTSIDE
                  .events-top-bar so the desktop horizontal flex layout for
                  calendar+type-tabs+storage stays uncluttered. Three labelled
                  rows below, each with its own "Any" to clear that dimension.
                -->
                <div class="actor-filter-rows">
                    <div class="filter-tabs filter-tabs-row2" data-filter-row="class">
                        <span class="filter-row-label" data-i18n="events.filter_what">What:</span>
                        <button class="filter-chip active" data-class="" onclick="BYD.events.setActorFilter('class','')" data-i18n="events.actor_any">Any</button>
                        <button class="filter-chip" data-class="person"  onclick="BYD.events.setActorFilter('class','person')" data-i18n="events.actor_person">Person</button>
                        <button class="filter-chip" data-class="vehicle" onclick="BYD.events.setActorFilter('class','vehicle')" data-i18n="events.actor_vehicle">Vehicle</button>
                        <button class="filter-chip" data-class="bike"    onclick="BYD.events.setActorFilter('class','bike')" data-i18n="events.actor_bike">Bike</button>
                        <button class="filter-chip" data-class="animal"  onclick="BYD.events.setActorFilter('class','animal')" data-i18n="events.actor_animal">Animal</button>
                    </div>
                    <div class="filter-tabs filter-tabs-row2" data-filter-row="severity">
                        <span class="filter-row-label" data-i18n="events.filter_severity">Severity:</span>
                        <button class="filter-chip active" data-severity="" onclick="BYD.events.setActorFilter('severity','')" data-i18n="events.actor_any">Any</button>
                        <button class="filter-chip sev-notice"   data-severity="NOTICE"   onclick="BYD.events.setActorFilter('severity','NOTICE')" data-i18n="events.severity_notice">Notice</button>
                        <button class="filter-chip sev-alert"    data-severity="ALERT"    onclick="BYD.events.setActorFilter('severity','ALERT')" data-i18n="events.severity_alert">Alert</button>
                        <button class="filter-chip sev-critical" data-severity="CRITICAL" onclick="BYD.events.setActorFilter('severity','CRITICAL')" data-i18n="events.severity_critical">Critical</button>
                    </div>
                    <div class="filter-tabs filter-tabs-row2" data-filter-row="proximity">
                        <span class="filter-row-label" data-i18n="events.filter_distance">Distance:</span>
                        <button class="filter-chip active" data-proximity="" onclick="BYD.events.setActorFilter('proximity','')" data-i18n="events.actor_any">Any</button>
                        <button class="filter-chip" data-proximity="VERY_CLOSE" onclick="BYD.events.setActorFilter('proximity','VERY_CLOSE')" data-i18n="events.proximity_very_close">Very close</button>
                        <button class="filter-chip" data-proximity="CLOSE"      onclick="BYD.events.setActorFilter('proximity','CLOSE')" data-i18n="events.proximity_close">Close</button>
                        <button class="filter-chip" data-proximity="MID"        onclick="BYD.events.setActorFilter('proximity','MID')" data-i18n="events.proximity_mid">Mid</button>
                        <button class="filter-chip" data-proximity="FAR"        onclick="BYD.events.setActorFilter('proximity','FAR')" data-i18n="events.proximity_far">Far</button>
                    </div>
                    <!--
                      Place chip row — dynamically populated from
                      `rec.place.short` of the currently loaded recordings
                      (descending count, alpha-tiebreak, capped at 8).
                      Always mounted now so the inline place-search input
                      is reachable from page load — even on a fresh user
                      with no resolved places yet, the search affordance
                      is visible. Data chips ("Any" + N labels) populate
                      progressively as the index lands.
                    -->
                    <div class="filter-tabs filter-tabs-row2" data-filter-row="place" id="placeFilterRow">
                        <span class="filter-row-label" data-i18n="events.filter_place">Place:</span>
                        <!--
                          Free-text place search — substring across short /
                          medium / displayName labels. Lives inline at the
                          head of the place row so the user sees one
                          coherent "Place" control rather than a separate
                          search bar competing for attention. Visibility is
                          coupled to the chip row — both appear once the
                          backend returns at least one indexed place; from
                          that moment the input remains visible regardless
                          of whether the active filter narrows the chip
                          set to zero.
                        -->
                        <label class="place-search" id="placeSearchWrap">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="search" id="placeSearchInput"
                                   autocomplete="off" autocorrect="off"
                                   autocapitalize="off" spellcheck="false"
                                   data-i18n-attr="placeholder:events.place_search_hint"
                                   placeholder="Search places…"
                                   data-i18n-attr-aria="aria-label:events.place_search_hint"
                                   aria-label="Search places" />
                            <button type="button" class="place-search-clear"
                                    id="placeSearchClear"
                                    data-i18n-attr="aria-label:common.close"
                                    aria-label="Clear">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </label>
                        <button class="filter-chip active" data-place="" onclick="BYD.events.setActorFilter('place','')" data-i18n="events.actor_any">Any</button>
                        <!-- Data chips injected by BYD.events.renderPlaceChips() -->
                        <span class="place-search-hits" id="placeSearchHits" aria-live="polite"></span>
                    </div>
                </div>
                
                <!-- Recordings List -->
                <div class="recordings-panel">
                    <div class="recordings-header">
                        <span class="recordings-title" id="recordingsTitle" data-i18n="events.all_recordings">All Recordings</span>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="recordings-count" id="recordingsCount" data-i18n="events.videos_count_initial">0 videos</span>
                            <button class="select-mode-btn" id="selectModeBtn" onclick="BYD.events.toggleSelectMode()" title="Select multiple" data-i18n-attr="title:events.select_multiple">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="9 11 12 14 22 4"/>
                                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <!-- Multi-select toolbar -->
                    <div class="select-toolbar" id="selectToolbar" style="display:none;">
                        <span class="selected-count" id="selectedCount" data-i18n="events.selected_count_initial">0 selected</span>
                        <div class="select-actions">
                            <button class="select-action-btn" onclick="BYD.events.selectAll()" data-i18n="common.select_all">Select All</button>
                            <button class="select-action-btn" onclick="BYD.events.deselectAll()" data-i18n="events.deselect">Deselect</button>
                            <button class="select-action-btn danger" onclick="BYD.events.batchDelete()" data-i18n="common.delete">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                </svg>
                                Delete
                            </button>
                            <button class="select-action-btn cancel" onclick="BYD.events.exitSelectMode()" data-i18n="common.cancel">Cancel</button>
                        </div>
                    </div>
                    <div class="recordings-list" id="recordingsList">
                        <div class="loading">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    <div class="pagination" id="pagination" style="display: none;">
                        <button class="pagination-btn" id="prevPageBtn" onclick="BYD.events.prevPage()" disabled data-i18n="events.prev">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M15 18l-6-6 6-6"/>
                            </svg>
                            Prev
                        </button>
                        <span class="pagination-info" id="paginationInfo" data-i18n="events.page_initial">Page 1 of 1</span>
                        <button class="pagination-btn" id="nextPageBtn" onclick="BYD.events.nextPage()" disabled data-i18n="events.next">
                            Next
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 18l6-6-6-6"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Video Modal -->
    <div class="video-modal" id="videoModal">
        <div class="video-container">
            <div class="video-header">
                <span class="video-title" id="videoTitle" data-i18n="events.video_title">Recording</span>
                <button class="video-close" onclick="BYD.events.closeVideo()" data-i18n-attr="title:common.close" title="Close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="video-player" id="videoPlayerWrap">
                <!-- IMPORTANT: NO `controls` attribute on <video>. The native
                     control bar is painted as part of the video element, so a
                     transform: scale(2) (used for quadrant zoom) drags the
                     timestamp + native scrubber off-screen. We render our own
                     transport chrome below this surface (see .video-transport)
                     which lives outside the zooming subtree. -->
                <video id="videoPlayer" autoplay muted playsinline webkit-playsinline preload="auto"></video>
                <!-- Quadrant selector. The four AVM cameras are baked into a
                     single MP4 as a 2x2 mosaic (Front=TL, Right=TR, Rear=BL,
                     Left=BR by GpuMosaicRecorder convention). Tapping a
                     quadrant button applies a CSS transform that zooms 2x to
                     just that camera; tapping the active button or the All
                     button restores the full mosaic view. -->
                <div class="quadrant-bar" id="quadrantBar" role="group" data-i18n-attr="aria-label:events.quadrant_group" aria-label="Camera selector">
                    <button type="button" data-quadrant="all" class="active" data-i18n-attr="title:events.quadrant_all;aria-label:events.quadrant_all" title="Show all cameras" aria-label="Show all cameras">
                        <svg viewBox="0 0 24 24"><rect class="qcell lit" x="3" y="3" width="8" height="8"/><rect class="qcell lit" x="13" y="3" width="8" height="8"/><rect class="qcell lit" x="3" y="13" width="8" height="8"/><rect class="qcell lit" x="13" y="13" width="8" height="8"/></svg>
                    </button>
                    <button type="button" data-quadrant="front" data-i18n-attr="title:events.quadrant_front;aria-label:events.quadrant_front" title="Show front camera" aria-label="Show front camera">
                        <svg viewBox="0 0 24 24"><rect class="qcell lit" x="3" y="3" width="8" height="8"/><rect class="qcell" x="13" y="3" width="8" height="8"/><rect class="qcell" x="3" y="13" width="8" height="8"/><rect class="qcell" x="13" y="13" width="8" height="8"/></svg>
                    </button>
                    <button type="button" data-quadrant="right" data-i18n-attr="title:events.quadrant_right;aria-label:events.quadrant_right" title="Show right camera" aria-label="Show right camera">
                        <svg viewBox="0 0 24 24"><rect class="qcell" x="3" y="3" width="8" height="8"/><rect class="qcell lit" x="13" y="3" width="8" height="8"/><rect class="qcell" x="3" y="13" width="8" height="8"/><rect class="qcell" x="13" y="13" width="8" height="8"/></svg>
                    </button>
                    <button type="button" data-quadrant="rear" data-i18n-attr="title:events.quadrant_rear;aria-label:events.quadrant_rear" title="Show rear camera" aria-label="Show rear camera">
                        <svg viewBox="0 0 24 24"><rect class="qcell" x="3" y="3" width="8" height="8"/><rect class="qcell" x="13" y="3" width="8" height="8"/><rect class="qcell lit" x="3" y="13" width="8" height="8"/><rect class="qcell" x="13" y="13" width="8" height="8"/></svg>
                    </button>
                    <button type="button" data-quadrant="left" data-i18n-attr="title:events.quadrant_left;aria-label:events.quadrant_left" title="Show left camera" aria-label="Show left camera">
                        <svg viewBox="0 0 24 24"><rect class="qcell" x="3" y="3" width="8" height="8"/><rect class="qcell" x="13" y="3" width="8" height="8"/><rect class="qcell" x="3" y="13" width="8" height="8"/><rect class="qcell lit" x="13" y="13" width="8" height="8"/></svg>
                    </button>
                </div>
            </div>
            <!-- ============================================================
                 Custom transport — lives OUTSIDE .video-player so quadrant
                 zoom never moves the scrubber, time text, or play/pause.
                 ============================================================ -->
            <div class="video-transport">
                <!-- Always-visible scrubber. Markers are populated only when
                     a JSON sidecar exists; the bar itself stays so users have
                     a seek surface for plain recordings too. -->
                <div class="timeline-scrubber" id="timelineScrubber" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Seek">
                    <div class="timeline-track" id="timelineTrack">
                        <div class="timeline-progress" id="timelineProgress"></div>
                    </div>
                    <div class="timeline-playhead smooth" id="timelinePlayhead"></div>
                </div>
                <!-- Event-type legend — hidden until the timeline has marker
                     data. Plain recordings show the scrubber alone. -->
                <div class="timeline-legend" id="timelineLegend" style="display:none;">
                    <span class="legend-item"><span class="legend-dot legend-motion"></span><span data-i18n="events.legend_motion">Motion</span></span>
                    <span class="legend-item"><span class="legend-dot legend-person"></span><span data-i18n="events.actor_person">Person</span></span>
                    <span class="legend-item"><span class="legend-dot legend-car"></span><span data-i18n="events.actor_vehicle">Vehicle</span></span>
                    <span class="legend-item"><span class="legend-dot legend-bike"></span><span data-i18n="events.actor_bike">Bike</span></span>
                </div>
                <div class="video-controls">
                    <button type="button" class="video-ctrl-btn" id="videoPlayPauseBtn" data-i18n-attr="title:events.player_play_pause;aria-label:events.player_play_pause" title="Play/Pause" aria-label="Play/Pause">
                        <!-- Icon swapped between play/pause in events.js -->
                        <svg id="videoPlayPauseIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
                    </button>
                    <span class="video-time" id="videoTimeDisplay">
                        <span id="videoCurTime">0:00</span><span class="sep">/</span><span class="dur" id="videoDurTime">0:00</span>
                    </span>
                    <span class="spacer"></span>
                    <button type="button" class="video-ctrl-btn" id="videoMuteBtn" data-i18n-attr="title:events.player_mute;aria-label:events.player_mute" title="Mute" aria-label="Mute">
                        <svg id="videoMuteIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <!-- Initial state — muted (the player starts muted for autoplay). -->
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                            <line x1="23" y1="9" x2="17" y2="15"/>
                            <line x1="17" y1="9" x2="23" y2="15"/>
                        </svg>
                    </button>
                    <!-- Fullscreen toggle. We fullscreen the .video-container
                         (NOT the <video>) so our quadrant zoom + custom
                         transport survive. Native <video> fullscreen would
                         drop us into the browser's player chrome and lose
                         the zoom transform. -->
                    <button type="button" class="video-ctrl-btn" id="videoFullscreenBtn" data-i18n-attr="title:events.player_fullscreen;aria-label:events.player_fullscreen" title="Fullscreen" aria-label="Fullscreen">
                        <svg id="videoFullscreenIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <!-- Initial state — enter fullscreen (corner brackets). -->
                            <path d="M4 9V4h5"/>
                            <path d="M20 9V4h-5"/>
                            <path d="M4 15v5h5"/>
                            <path d="M20 15v5h-5"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="video-details">
                <div class="video-meta">
                    <span id="videoDate">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        --
                    </span>
                    <span id="videoTime">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <polyline points="12 6 12 12 16 14"/>
                        </svg>
                        --
                    </span>
                    <span id="videoSize">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        --
                    </span>
                </div>
                <a class="download-btn" id="downloadBtn" href="#" download>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    <span data-i18n="common.download">Download</span>
                </a>
            </div>
        </div>
    </div>
    
    <!-- Calendar Popup -->
    <div class="calendar-popup" id="calendarPopup">
        <div class="calendar-panel">
            <div class="calendar-header">
                <span class="calendar-title" id="calendarTitle" data-i18n="events.calendar_title_initial">Calendar</span>
                <div class="calendar-nav">
                    <button onclick="BYD.events.prevMonth()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M15 18l-6-6 6-6"/>
                        </svg>
                    </button>
                    <button onclick="BYD.events.nextMonth()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 18l6-6-6-6"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Calendar days will be rendered here -->
            </div>
            <button class="calendar-close" onclick="BYD.events.closeCalendar()" data-i18n="common.close">Close</button>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div id="toastContainer" class="toast-container"></div>

    <script src="../shared/auth.js"></script>
    <script src="../shared/pwa-init.js?v=index1"></script>
    <script src="../shared/core.js"></script>
    <script src="../shared/update-flow.js"></script>
    <script src="../shared/events.js?v=placesearch2"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            BYD.i18n.init().then(function () {
                BYD.core.init();
                BYD.events.init();
            });
        });
    </script>
</body>
</html>
